<div class="container">
    {% include article_heading.html article = include.article %}

    <div class="content">
        {% if include.article.image %}
        <img src="{{ include.article.image }}"/>
        {% endif %}

        {{ include.content }}

        {% if include.article.date %}
        <div class="date">{{ include.article.date | date: site.date_format }}</div>
        {% endif %}

        <div class="clearfix"></div>
    </div>
</div>
