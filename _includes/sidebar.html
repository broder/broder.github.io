<header>
    <img src="{{ "/assets/logo.png" | relative_url }}" />

    <nav>
        <a class="menu-item" href="#menu" id="toggle">
            <i class="fa fa-bars fa-fw fa-lg" aria-hidden="true"></i>menu
        </a>

        <div id="menu">
            {% for my_page in site.pages %}
            {% if my_page.title %}
            <a class="menu-item" href="{{ my_page.url | relative_url }}">
                <i class="fa fa-fw fa-lg">&nbsp;</i>{{ my_page.title | downcase | escape }}
            </a>
            {% endif %}
            {% endfor %}

            <a class="menu-item" href="https://facebook.com/{{site.facebook_username}}">
                <i class="fa fa-facebook-square fa-fw fa-lg" aria-hidden="true"></i>facebook
            </a>

            <a class="menu-item" href="https://twitter.com/{{site.twitter_username}}">
                <i class="fa fa-twitter-square fa-fw fa-lg" aria-hidden="true"></i>twitter
            </a>

            <a class="menu-item" href="https://linkedin.com/in/{{site.linkedin_username}}">
                <i class="fa fa-linkedin-square fa-fw fa-lg" aria-hidden="true"></i>linkedin
            </a>

            <a class="menu-item" href="https://github.com/{{site.github_username}}">
                <i class="fa fa-github-square fa-fw fa-lg" aria-hidden="true"></i>github
            </a>

            <a class="menu-item" href="https://steamcommunity.com/id/{{site.steam_username}}">
                <i class="fa fa-steam-square fa-fw fa-lg" aria-hidden="true"></i>steam
            </a>
        </div>
    </nav>
</header>
