      layout: page

jekyll-minifier:
  exclude:
    - feed.xml
    - sitemap.xml

# Build settings
markdown: kramdown
gems:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-minifier
exclude:
  - .gitignore
  - deploy.sh
  - Gemfile
