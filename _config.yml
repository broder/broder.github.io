title: David Broder-Rodgers
author: David Broder-Rodgers
description: >
  Hi, my name is David Broder-Rodgers and I'm a software developer. This site contains some
  of the things I've made - hopefully there will be much more here in the future!
baseurl: ""
url: https://djbr.uk
permalink: /:year/:month/:day/:title.html
paginate: 5
paginate_path: /:num/
date_format: '%b %-d, %Y'
facebook_username: dbroderr
linkedin_username: broder
github_username: broder
github_project: broder.github.io
steam_username: broder
placeholder_image: 'data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=='
