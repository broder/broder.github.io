---
layout: default
---
<div class="container">
    <div class="heading">
        <h2 class="title">
            {{ page.title | escape }}
        </h2>
        <h3 class="subtitle">{{ page.tags }}</h3>
    </div>

    <div class="content">
        {{ content }}
        <div class="date">{{ page.date | date: "%b %-d, %Y" }}</div>
        <div class="clearfix"></div>
    </div>
</div>
