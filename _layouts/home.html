---
layout: default
---

<div class="home">

  {{ content }}

  <div class="container">
    {% for post in site.posts %}
      <div>
        <h2>
          {{ post.title | escape }}
        </h2>

        <span>{{ post.date | date: "%b %-d, %Y" }}</span>

        {{ post.excerpt }}

        <a href="{{ post.url | relative_url }}">Read more ></a>
      </div>
    {% endfor %}
  </div>

</div>
